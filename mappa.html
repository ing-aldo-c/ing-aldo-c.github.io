  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cataldo Carletta - CV Geospaziale</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0d9488; --teal-d: #0f766e;
      --amber: #f59e0b; --purple: #6366f1;
      --dark: #0f172a; --mid: #1e293b;
    }
    html, body { height: 100%; font-family: "Inter", Arial, sans-serif; background: var(--dark); }

    /* HEADER */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 58px; z-index: 2000;
      background: rgba(15,23,42,0.96);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(10px);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      color: #fff; font-size: 1rem; font-weight: 700;
    }
    .brand-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--teal); box-shadow: 0 0 8px var(--teal);
    }
    .hbtns { display: flex; gap: 8px; }
    .hbtns a {
      text-decoration: none; color: #fff; font-size: 13px; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; display: flex; align-items: center; gap: 5px;
      transition: 0.2s;
    }
    .hbtns .pdf { background: var(--amber); }
    .hbtns .pdf:hover { background: #d97706; }
    .hbtns .email { background: #0891b2; }
    .hbtns .email:hover { background: #0e7490; }
    .hbtns .linkedin { background: #0a66c2; }
    .hbtns .linkedin:hover { background: #004182; }
    .hbtns .home { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }
    .hbtns .home:hover { background: rgba(255,255,255,0.15); }

    /* TABS */
    #tabs {
      position: fixed; top: 58px; left: 0; width: 38%; z-index: 1900;
      display: flex;
      background: var(--mid);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .tab {
      flex: 1; text-align: center; padding: 11px 0; cursor: pointer;
      font-size: 13px; font-weight: 700; color: #64748b;
      border-bottom: 3px solid transparent; transition: 0.2s;
    }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); background: rgba(13,148,136,0.08); }
    .tab:hover { color: #fff; }

    /* LAYOUT */
    #container { display: flex; height: calc(100vh - 58px); margin-top: 58px; }
    #sidebar {
      width: 38%; background: var(--mid);
      border-right: 1px solid rgba(255,255,255,0.07);
      overflow-y: auto; padding: 46px 14px 20px;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(13,148,136,0.3); border-radius: 4px; }
    #mapbox { flex: 1; height: 100%; position: relative; }
    #map { width: 100%; height: 100%; }

    /* layer toggle btn */
    #layerBtn {
      position: absolute; bottom: 28px; right: 14px; z-index: 1000;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 10px 14px;
      cursor: pointer; color: #fff; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: 0.2s;
    }
    #layerBtn:hover { background: rgba(13,148,136,0.25); border-color: var(--teal); }
    #layerBtn .icon { font-size: 18px; }

    .section { display: none; }
    .section.active { display: block; }

    /* CARDS */
    .card {
      border-radius: 12px; padding: 14px;
      margin-bottom: 10px; cursor: pointer;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 4px solid var(--teal);
      transition: 0.22s;
    }
    .card.formazione { border-left-color: var(--purple); }
    .card:hover, .card.highlight {
      background: rgba(13,148,136,0.1);
      border-color: rgba(13,148,136,0.4);
      transform: translateX(3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .card.formazione:hover, .card.formazione.highlight {
      background: rgba(99,102,241,0.1);
      border-color: rgba(99,102,241,0.4);
    }
    .card h3 { font-size: 14px; color: #f1f5f9; margin-bottom: 5px; font-weight: 700; }
    .card .ruolo { font-size: 12px; color: var(--teal); font-weight: 600; margin-bottom: 4px; }
    .card.formazione .ruolo { color: #818cf8; }
    .card .periodo { font-size: 11px; color: var(--amber); font-weight: 700; margin-bottom: 6px; }
    .card .luogo { font-size: 12px; color: #64748b; margin-bottom: 6px; }
    .card .desc { font-size: 12px; color: #94a3b8; line-height: 1.45; }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; margin-bottom: 6px;
    }
    .badge.attuale { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge.passato { background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.2); }

    @media(max-width:900px){
      #tabs { width: 100%; }
      #container { flex-direction: column; }
      #sidebar { width: 100%; height: 45%; padding-top: 50px; }
      #mapbox { height: 55%; }
    }

    /* marker pin */
    .mk-wrap { width:36px; height:48px; display:flex; flex-direction:column; align-items:center; }
    .mk-pin {
      width:36px; height:36px; border-radius:50% 50% 50% 0;
      transform:rotate(-45deg); border:3px solid #fff;
      box-shadow:0 4px 14px rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
    }
    .mk-icon {
      transform:rotate(45deg); color:#fff; font-size:15px;
      display:flex; align-items:center; justify-content:center;
    }
    .mk-tail { width:2px; height:10px; background:rgba(0,0,0,0.25); border-radius:0 0 2px 2px; }
  
    /* ── MOBILE: nascondi subtitle brand ── */
    @media (max-width: 600px) {
      .brand span:last-child {
        display: none;
      }
      .brand {
        gap: 7px;
      }
      .brand > div:first-child {
        width: 30px !important;
        height: 30px !important;
        font-size: 12px !important;
      }
      .hbtns a {
        font-size: 11px;
        padding: 5px 8px;
      }
      .hbtns a span { display: none; }
      /* mostra solo icone nei bottoni su mobile */
    }
    @media (max-width: 380px) {
      .hbtns .email span, .hbtns .linkedin span, .hbtns .home span { display: none; }
    }

    /* ── FILTRO CATEGORIE MAPPA ── */
    #filterPanel {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1000;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 170px;
    }
    #filterPanel .fp-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 2px;

    .fp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;

    .fp-row input[type=checkbox] {
      width: 15px; height: 15px;
      accent-color: var(--teal);

    }
    .fp-row.formazione input[type=checkbox] {

    .fp-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

  </style>
</head>
<body>
  <div id="header">

  <div id="tabs">

    <div id="mapbox">
          <div id="filterPanel">
      <div class="fp-title">&#127757; Filtra layer</div>
      <label class="fp-row">
        <input type="checkbox" id="chkLavoro" checked onchange="toggleCategory('lavoro', this.checked)">
        <span class="fp-dot" style="background:#0d9488;"></span>

      </label>
      <label class="fp-row formazione">
        <input type="checkbox" id="chkFormazione" checked onchange="toggleCategory('formazione', this.checked)">

        &#127891; Formazione
      </label>
    </div>
    <div id="map"></div>
      <div id="layerBtn" onclick="toggleLayer()">
        <span class="icon">&#128506;</span>
        <span id="layerLabel">Passa a Mappa</span>
      </div>
    </div>
  </div>

  <script>
    var esperienze = [{"azienda": "Caltaqua - Acque di Caltanissetta S.p.A.", "ruolo": "Responsabile sistemi telecontrollo e SIT", "luogo": "Provincia di Caltanissetta", "data": "10/2020", "fine": "IN CORSO", "lat": 37.4902857, "lng": 14.0641639, "desc": "Gestione e innovazione delle infrastrutture idriche, telecontrollo e digitalizzazione della rete provinciale. Progettazione e direzione lavori, implementazione SIT e GIS, monitoraggio, prevenzione frodi e manutenzione predittiva degli asset."}, {"azienda": "Studio Carletta", "ruolo": "Libero Professionista", "luogo": "San Cataldo (CL)", "data": "2015", "fine": "IN CORSO", "lat": 37.4862902, "lng": 14.0018804, "desc": "Progettazione strutturale/architettonica, Direzione Lavori, incentivi statali (Ecobonus 110%), certificazioni energetiche, reti idriche e fognarie, consulenze tecniche e pratiche catastali."}, {"azienda": "Comune di Acireale (CT)", "ruolo": "Istruttore Direttivo Tecnico - Supporto Ricostruzione Post-Sisma", "luogo": "Acireale (CT)", "data": "12/2019", "fine": "10/2020", "lat": 37.6205149, "lng": 15.1596834, "desc": "Supporto tecnico per la ricostruzione post-sisma 2018. Implementazione SIT, sicurezza, progettazione e direzione lavori di opere pubbliche."}, {"azienda": "EKSO S.R.L. - ENI Raffineria di Livorno", "ruolo": "Responsabile Tecnico di Cantiere", "luogo": "Livorno (LI)", "data": "02/2019", "fine": "09/2020", "lat": 43.5862266, "lng": 10.3453059, "desc": "Risanamento e ripristino condotte (relining), rilievi topografici, sicurezza cantieri, gestione dati e sistema informativo di impianto."}, {"azienda": "EKSO S.R.L. - ENI Versalis Crescentino", "ruolo": "Responsabile Tecnico di Cantiere", "luogo": "Crescentino (VC)", "data": "02/2019", "fine": "09/2020", "lat": 45.2022067, "lng": 8.0555469, "desc": "Risanamento e ripristino condotte (relining), rilievi topografici, sicurezza cantieri, gestione dati presso stabilimento ENI Versalis."}, {"azienda": "3TI Progetti S.p.A.", "ruolo": "Consulente Tecnico - Ingegnere Civile", "luogo": "Roma", "data": "11/2018", "fine": "02/2019", "lat": 41.8674487, "lng": 12.472563, "desc": "Progettazioni infrastrutture civili: porto commerciale di Venezia (MIKE), rilievo reti idriche/fognarie Acqualatina (GPS Leica Zeno 20, GIS, AutoCAD Civil 3D)."}, {"azienda": "Geographischen Institut Universitaet Bonn (GIUB)", "ruolo": "Ricercatore - Progetto Erasmus", "luogo": "Bonn, Germania", "data": "02/2018", "fine": "05/2018", "lat": 50.7253407, "lng": 7.0910319, "desc": "Analisi di modelli previsionali per scenari climatici futuri. Work placement Erasmus certificato."}, {"azienda": "Studio Tecnico Arcarese", "ruolo": "Ingegnere Civile", "luogo": "San Cataldo (CL)", "data": "12/2017", "fine": "09/2018", "lat": 37.48843, "lng": 13.9918532, "desc": "Collaborazione alla progettazione del Piano Regolatore del Comune di Sutera (CL)."}, {"azienda": "Genio Civile di Caltanissetta", "ruolo": "Ingegnere Civile", "luogo": "Caltanissetta", "data": "06/2017", "fine": "09/2017", "lat": 37.4934126, "lng": 14.0544682, "desc": "Sistema di gestione dati risorse idriche provinciali tramite GIS. Premiato con ENCOMIO da parte del Genio Civile."}, {"azienda": "Consorzio di Bonifica 9", "ruolo": "Tirocinante", "luogo": "Catania", "data": "30/01/2017", "fine": "30/05/2017", "lat": 37.5181063, "lng": 15.0902456, "desc": "Sistemazioni idrauliche fluviali, studi idrogeologici, progettazione manufatti accessori, calcolo idraulico, studi di fattibilita."}];
    var formazione = [{"nome": "Laurea in Ingegneria Civile", "desc": "Tesi: Rifacimento della rete idrica della zona centro del comune di Gela", "data": "2014", "luogo": "Universita degli Studi di Catania", "lat": 37.525871, "lng": 15.0739425}, {"nome": "Abilitazione professione di Ingegnere", "desc": "", "data": "09/02/2015", "luogo": "Universita degli Studi di Catania", "lat": 37.5257402, "lng": 15.0736543}, {"nome": "Iscrizione Ordine degli Ingegneri di Caltanissetta", "desc": "", "data": "27/02/2015", "luogo": "Ordine Ingegneri Caltanissetta", "lat": 37.4943018, "lng": 14.0489751}, {"nome": "Laurea Magistrale Ingegneria Civile delle Acque e dei Trasporti - 110/110", "desc": "LM-23 | Tesi: Verifica idrologico-idraulica HEC-RAS al Torrente Sbarda l'Asino - Consorzio di Bonifica di Catania", "data": "19/10/2017", "luogo": "Universita degli Studi di Catania", "lat": 37.5262776, "lng": 15.0746305}, {"nome": "Abilitazione Albo A - Ingegnere", "desc": "", "data": "20/12/2017", "luogo": "Universita degli Studi di Catania", "lat": 37.5262826, "lng": 15.0748317}, {"nome": "Dottorato di ricerca - Valutazione e mitigazione dei rischi urbani e territoriali", "desc": "IN CORSO", "data": "24/09/2024", "luogo": "Universita degli Studi di Catania", "lat": 37.5274023, "lng": 15.0769074}];

    /* ── TILE LAYERS ─────────────────────────────────────────────────────────
       Street: CartoDB Voyager (stile simile a Google Maps, nessun problema referer)
       Satellite: ESRI World Imagery + etichette CartoDB
    */
    var streetLayer = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
      { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>', maxZoom: 19 }
    );

    var satelliteLayer = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { attribution: '&copy; <a href="https://www.esri.com/">Esri</a> &mdash; Source: Esri, Maxar, Earthstar Geographics', maxZoom: 19 }
    );

    var labelsLayer = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
      { attribution: '', maxZoom: 19, opacity: 0.9, pane: 'shadowPane' }
    );

    var map = L.map('map', { zoomControl: true });
    map.setView([43.0, 12.5], 6);
    satelliteLayer.addTo(map);
    labelsLayer.addTo(map);

    var isSatellite = true;
    
    function toggleCategory(tipo, visible) {
      var markers = tipo === 'lavoro' ? markersLavoro : markersFormazione;
      markers.forEach(function(m) {
        if (visible) {
          if (!map.hasLayer(m)) m.addTo(map);
        } else {
          if (map.hasLayer(m)) map.removeLayer(m);
        }
      });
    }

    function toggleLayer() {
      if (!isSatellite) {
        map.removeLayer(streetLayer);
        satelliteLayer.addTo(map);
        labelsLayer.addTo(map);
        document.getElementById('layerLabel').textContent = 'Passa a Mappa';
        document.getElementById('layerBtn').querySelector('.icon').textContent = '\uD83D\uDDFA';
        isSatellite = true;
      } else {
        map.removeLayer(satelliteLayer);
        map.removeLayer(labelsLayer);
        satelliteLayer.addTo(map);
    labelsLayer.addTo(map);
        document.getElementById('layerLabel').textContent = 'Passa a Satellite';
        document.getElementById('layerBtn').querySelector('.icon').textContent = '\uD83C\uDF0F';
        isSatellite = false;
      }
    }

    /* ── ZOOM CONTESTUALE ────────────────────────────────────────────────── */
    function zoomCtx(lat) {
      if (lat > 48) return 8;
      if (lat > 44) return 9;
      if (lat > 41) return 9;
      return 10;
    }

    /* ── MARKERS ─────────────────────────────────────────────────────────── */
    var markersLavoro = [];
    var markersFormazione = [];
    var allBounds = [];
    var activeCard = null;

    function mkIcon(tipo) {
      var bg = tipo === 'lavoro' ? '#0d9488' : '#6366f1';
      var fa = tipo === 'lavoro' ? 'fa-briefcase' : 'fa-graduation-cap';
      var html =
        '<div class="mk-wrap">' +
          '<div class="mk-pin" style="background:' + bg + '">' +
            '<span class="mk-icon"><i class="fas ' + fa + '"></i></span>' +
          '</div>' +
          '<div class="mk-tail"></div>' +
        '</div>';
      return L.divIcon({ className:'', html:html, iconSize:[36,48], iconAnchor:[18,48] });
    }

    function addMarker(item, color, arr) {
      var tipo = color === '#14b8a6' ? 'lavoro' : 'formazione';
      var m = L.marker([item.lat, item.lng], { icon: mkIcon(tipo) }).addTo(map);
      var t = item.azienda || item.nome || '';
      var p = '<b>' + t + '</b><br>' +
              (item.ruolo ? '<i>' + item.ruolo + '</i><br>' : '') +
              (item.data || '') + (item.fine ? ' &rarr; ' + item.fine : '') + '<br>' +
              '&#128205; ' + (item.luogo || '') +
              (item.desc ? '<br><small style=\'color:#555\'>' + item.desc + '</small>' : '');
      m.bindPopup(p, { maxWidth: 300 });
      arr.push(m);
      allBounds.push([item.lat, item.lng]);
    }

    esperienze.forEach(function(e) { addMarker(e, '#14b8a6', markersLavoro); });
    formazione.forEach(function(f) { addMarker(f, '#818cf8', markersFormazione); });
    function fitAll() {
      map.invalidateSize();
      if (allBounds.length) map.fitBounds(allBounds, { padding: [60,60], maxZoom: 10 });
    }
    setTimeout(fitAll, 300);

    /* ── SIDEBAR CARDS ───────────────────────────────────────────────────── */
    function creaCard(item, idx, markers, tipo) {
      var card = document.createElement('div');
      card.className = 'card' + (tipo === 'f' ? ' formazione' : '');
      var isCorso = item.fine === 'IN CORSO';
      var badge = isCorso
        ? '<span class="badge attuale">&#9679; In corso</span>'
        : '<span class="badge passato">' + (item.fine || '') + '</span>';
      var titolo = item.azienda || item.nome || '';
      card.innerHTML =
        badge +
        '<h3>' + titolo + '</h3>' +
        (item.ruolo ? '<div class="ruolo">' + item.ruolo + '</div>' : '') +
        '<div class="periodo">' + (item.data || '') + (item.fine ? ' &rarr; ' + item.fine : '') + '</div>' +
        '<div class="luogo">&#128205; ' + (item.luogo || '') + '</div>' +
        (item.desc ? '<div class="desc">' + item.desc + '</div>' : '');

      var go = function() {
        if (activeCard) activeCard.classList.remove('highlight');
        card.classList.add('highlight');
        activeCard = card;
        map.setView([item.lat, item.lng], zoomCtx(item.lat), { animate: true, duration: 0.8 });
        setTimeout(function() { markers[idx].openPopup(); }, 500);
        setTimeout(function() { map.invalidateSize(); }, 100);
      };
      card.addEventListener('mouseenter', go);
      card.addEventListener('click', go);
      return card;
    }

    var sL = document.getElementById('sec-lavoro');
    var sF = document.getElementById('sec-formazione');
    esperienze.forEach(function(e, i) { sL.appendChild(creaCard(e, i, markersLavoro, 'l')); });
    formazione.forEach(function(f, i) { sF.appendChild(creaCard(f, i, markersFormazione, 'f')); });

    var tabs = document.querySelectorAll('.tab');
    function mostraSezione(tipo) {
      sL.classList.toggle('active', tipo === 'lavoro');
      sF.classList.toggle('active', tipo === 'formazione');
      tabs[0].classList.toggle('active', tipo === 'lavoro');
      tabs[1].classList.toggle('active', tipo === 'formazione');
      if (activeCard) { activeCard.classList.remove('highlight'); activeCard = null; }
      map.fitBounds(allBounds, { padding: [30,30] });
      setTimeout(function() { map.invalidateSize(); }, 150);
    }
    window.mostraSezione = mostraSezione;
    setTimeout(function() { map.invalidateSize(); }, 400);
  </script>
</body>
